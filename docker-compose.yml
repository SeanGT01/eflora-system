version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: eflowers-postgres
    environment:
      POSTGRES_DB: eflowers_db
      POSTGRES_USER: eflowers_user
      POSTGRES_PASSWORD: eflowers_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:  # ← ADD THIS SECTION!
    image: dpage/pgadmin4
    container_name: eflowers-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@eflowers.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"  # ← This maps port 5050 on your computer to pgAdmin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:  # ← ADD THIS TOO!