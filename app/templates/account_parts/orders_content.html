<!-- account_parts/orders_content.html -->
<style>
/* ── Orders Page ── */
.orders-page { 
    padding: clamp(0.75rem, 1.5vw, 1rem); 
    max-width: 1000px;
    margin: 0 auto;
}

.orders-page-title {
    font-family: var(--font-display);
    font-size: clamp(20px, 3vw, 24px);
    font-weight: 400;
    color: var(--charcoal);
    margin-bottom: clamp(1rem, 2vw, 1.25rem);
    line-height: 1.2;
    letter-spacing: -0.5px;
}

/* ── Status Tab Bar ── */
.order-tabs {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 1.5rem;
    overflow-x: auto;
    scrollbar-width: none;
}
.order-tabs::-webkit-scrollbar { display: none; }

.order-tab {
    padding: clamp(0.5rem, 1.5vw, 0.65rem) clamp(0.75rem, 2vw, 1rem);
    font-size: clamp(12px, 2vw, 13px);
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border: none;
    background: none;
    font-family: var(--font-sans);
    white-space: nowrap;
    position: relative;
    transition: all 0.3s ease;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
}
.order-tab:hover { 
    color: var(--charcoal);
    opacity: 0.8;
}
.order-tab.active {
    color: var(--deep-rose);
    border-bottom-color: var(--deep-rose);
    font-weight: 700;
}

.tab-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    background: var(--deep-rose);
    color: white;
    border-radius: 50px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 6px;
    padding: 0 5px;
}

/* ── Search Bar ── */
.orders-search-bar {
    position: relative;
    margin-bottom: 1.25rem;
}
.orders-search-bar i {
    position: absolute;
    left: clamp(0.75rem, 2vw, 1rem);
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: clamp(14px, 3vw, 16px);
}
.orders-search-bar input {
    width: 100%;
    padding: clamp(0.6rem, 2vw, 0.7rem) clamp(0.75rem, 2vw, 1rem) clamp(0.6rem, 2vw, 0.7rem) clamp(2.5rem, 8vw, 2.75rem);
    background: var(--cream);
    border: 1.5px solid var(--border-strong);
    border-radius: var(--radius-pill);
    font-family: var(--font-sans);
    font-size: clamp(12px, 2.5vw, 13px);
    color: var(--charcoal);
    outline: none;
    transition: var(--transition);
}
.orders-search-bar input:focus {
    border-color: var(--deep-rose);
    background: var(--warm-white);
    box-shadow: 0 0 0 3px rgba(181,68,90,0.08);
}
.orders-search-bar input::placeholder {
    color: var(--muted);
    opacity: 0.7;
}

/* ── Order Card ── */
.order-card {
    background: linear-gradient(180deg, #fffdfa 0%, #fffaf5 100%);
    border-radius: var(--radius-xl);
    border: 1px solid rgba(181,68,90,0.14);
    margin-bottom: clamp(0.85rem, 1.4vw, 1rem);
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 30px rgba(42,35,30,0.08);
    position: relative;
}
.order-card:hover {
    border-color: var(--deep-rose);
    box-shadow: 0 16px 36px rgba(181,68,90,0.15);
    transform: translateY(-2px);
}

/* Store header */
.order-card-store-hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: clamp(0.65rem, 1.2vw, 0.85rem) clamp(0.85rem, 1.5vw, 1rem);
    border-bottom: 1px solid rgba(181,68,90,0.08);
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(2px);
    gap: 0.65rem;
    flex-wrap: wrap;
}
.order-store-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.order-store-icon {
    width: clamp(24px, 5vw, 28px);
    height: clamp(24px, 5vw, 28px);
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blush), var(--dusty-rose));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(11px, 2.5vw, 13px);
    color: white;
    flex-shrink: 0;
}
.order-store-name {
    font-size: clamp(12px, 2vw, 13px);
    font-weight: 700;
    color: var(--charcoal);
    word-break: break-word;
}
.order-status-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: clamp(5px, 1.5vw, 7px) clamp(10px, 2.5vw, 12px);
    border-radius: var(--radius-pill);
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border: 1px solid transparent;
}
.badge-pending      { background: #fff4e6; color: #b37e00; border-color: #f4d8a9; }
.badge-processing   { background: #eaf2ff; color: #0052cc; border-color: #bfd7ff; }
.badge-preparing    { background: #eaf2ff; color: #0052cc; border-color: #bfd7ff; }
.badge-done_preparing { background: #e8f5e9; color: #2e7d32; border-color: #bde2bf; }
.badge-on_delivery  { background: #e8f8f5; color: #00796b; border-color: #b5e0d8; }
.badge-delivered    { background: #e8f5e9; color: #2e7d32; border-color: #bde2bf; }
.badge-cancelled    { background: #ffebee; color: #c62828; border-color: #f2b2b2; }

/* Items list */
.order-items-list {
    padding: clamp(0.7rem, 1.1vw, 0.85rem) clamp(0.85rem, 1.5vw, 1rem);
}
.order-item-row {
    display: flex;
    gap: clamp(0.5rem, 1vw, 0.625rem);
    align-items: flex-start;
    padding: clamp(0.6rem, 1.2vw, 0.75rem);
    border-bottom: 1px solid rgba(181,68,90,0.08);
    border-radius: 12px;
    background: rgba(255,255,255,0.85);
    margin-bottom: 0.4rem;
}
.order-item-row:last-child { border-bottom: none; margin-bottom: 0; }

.order-item-img {
    width: 55px;
    height: 55px;
    border-radius: var(--radius-md);
    object-fit: cover;
    background: linear-gradient(145deg, #f5ede6, #ede3d8);
    flex-shrink: 0;
}
.order-item-img-ph {
    width: 55px;
    height: 55px;
    border-radius: var(--radius-md);
    background: linear-gradient(145deg, #f5ede6, #ede3d8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: rgba(107,76,59,0.15);
    flex-shrink: 0;
}

.order-item-info { 
    flex: 1; 
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
}

.order-item-name {
    font-size: clamp(11px, 1.8vw, 12px);
    font-weight: 600;
    color: var(--charcoal);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.3;
}

.order-item-variant {
    font-size: clamp(11px, 2vw, 12px);
    color: var(--deep-rose);
    font-weight: 500;
}

.order-item-qty {
    font-size: clamp(11px, 2vw, 12px);
    color: var(--muted);
}

.order-item-price {
    font-family: var(--font-display);
    font-size: clamp(13px, 2.7vw, 16px);
    font-weight: 600;
    color: var(--deep-rose);
    white-space: nowrap;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: 0.3rem;
}

/* Footer */
.order-card-footer {
    padding: clamp(0.75rem, 1.2vw, 0.9rem) clamp(0.85rem, 1.5vw, 1rem);
    border-top: 1px solid rgba(181,68,90,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: clamp(0.5rem, 1vw, 0.625rem);
    background: rgba(255,255,255,0.82);
}
.order-total-block {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}
.order-total-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 1px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.order-total-amount {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 700;
    color: var(--deep-rose);
}
.order-total-items {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
}

.order-card-actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: flex-end;
}

.btn-order-action {
    padding: clamp(0.42rem, 0.8vw, 0.52rem) clamp(0.85rem, 1.6vw, 1rem);
    border-radius: 999px;
    font-size: clamp(10px, 1.65vw, 11px);
    font-weight: 600;
    font-family: var(--font-sans);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid rgba(107,76,59,0.28);
    background: rgba(255,255,255,0.95);
    color: var(--charcoal);
    white-space: nowrap;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.3rem;
}
.btn-order-action:hover {
    border-color: var(--deep-rose);
    background: rgba(181,68,90,0.07);
    color: var(--deep-rose);
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(75,46,30,0.14);
}
.btn-order-action.primary {
    background: var(--deep-rose);
    border-color: var(--deep-rose);
    color: white;
}
.btn-order-action.primary:hover {
    background: #9b3048;
    border-color: #9b3048;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(181,68,90,0.3);
}
.btn-order-action.danger {
    color: #c62828;
    border-color: rgba(198,40,40,0.3);
}
.btn-order-action.danger:hover {
    background: #c62828;
    border-color: #c62828;
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(198,40,40,0.2);
}

/* Order meta (date / order #) */
.order-meta-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.6rem 1rem;
    background: rgba(250,246,240,0.5);
    border-bottom: 1px solid rgba(181,68,90,0.08);
    font-size: 11.5px;
    color: var(--muted);
}
.order-meta-row span { display: flex; align-items: center; gap: 4px; }
.order-meta-row i { font-size: 13px; }

/* Collapsed items */
.order-more-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    padding: 3px 10px;
    margin-top: 6px;
    cursor: pointer;
    transition: var(--transition);
}
.order-more-badge:hover { border-color: var(--deep-rose); color: var(--deep-rose); }

/* ── Empty / Loading ── */
.orders-empty {
    text-align: center;
    padding: clamp(2rem, 5vw, 3rem) clamp(1.25rem, 2.5vw, 1.5rem);
    color: var(--muted);
}

.orders-empty-icon {
    font-size: clamp(40px, 12vw, 60px);
    opacity: 0.08;
    margin-bottom: clamp(1rem, 2vw, 1.25rem);
    display: block;
}

.orders-empty-title {
    font-family: var(--font-display);
    font-size: clamp(18px, 4vw, 22px);
    font-weight: 400;
    margin-bottom: clamp(0.4rem, 0.8vw, 0.5rem);
    color: var(--charcoal);
    line-height: 1.3;
    letter-spacing: -0.3px;
}

.orders-empty-sub {
    font-size: clamp(12px, 2.5vw, 13px);
    opacity: 0.65;
    margin-bottom: clamp(1rem, 2vw, 1.25rem);
    line-height: 1.5;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
}

.orders-skeleton {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}
.skeleton-card {
    background: var(--warm-white);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}
.skeleton-line {
    height: 12px;
    background: linear-gradient(90deg, var(--cream) 25%, rgba(245,237,230,0.5) 50%, var(--cream) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
}
.skeleton-line.short  { width: 40%; }
.skeleton-line.medium { width: 65%; }
.skeleton-line.long   { width: 90%; }
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* ── Order Detail Modal ── */
.order-detail-modal {
    max-width: 640px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
    border-radius: var(--radius-lg);
    max-height: 95vh;
    display: flex;
    flex-direction: column;
}

.order-detail-section {
    margin-bottom: 1.5rem;
}
.order-detail-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
}
.order-detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
}
.order-detail-item {
    background: var(--cream);
    border-radius: var(--radius-md);
    padding: clamp(0.75rem, 2vw, 1rem);
    transition: var(--transition);
}
.order-detail-item:hover {
    background: rgba(200, 100, 120, 0.05);
}
.order-detail-item-label {
    font-size: clamp(10px, 1.5vw, 11px);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 3px;
}
.order-detail-item-value {
    font-size: clamp(13px, 2.5vw, 14px);
    font-weight: 600;
    color: var(--charcoal);
    word-break: break-word;
    line-height: 1.4;
}
.order-detail-item-value.highlight { 
    color: var(--deep-rose); 
    font-family: var(--font-display); 
    font-size: clamp(16px, 4vw, 18px); 
}

/* Progress tracker */
.order-progress {
    display: flex;
    align-items: center;
    gap: 0;
    margin: 1.5rem 0;
    position: relative;
}
.progress-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
    z-index: 1;
}
.progress-step-dot {
    width: clamp(28px, 6vw, 32px);
    height: clamp(28px, 6vw, 32px);
    border-radius: 50%;
    background: var(--cream);
    border: 2px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(12px, 2.5vw, 14px);
    color: var(--muted);
    margin-bottom: clamp(4px, 1vw, 6px);
    transition: var(--transition);
}
.progress-step.done .progress-step-dot {
    background: var(--deep-rose);
    border-color: var(--deep-rose);
    color: white;
}
.progress-step.active .progress-step-dot {
    background: var(--warm-white);
    border-color: var(--deep-rose);
    color: var(--deep-rose);
    box-shadow: 0 0 0 4px rgba(181,68,90,0.12);
}
.progress-step-label {
    font-size: clamp(8px, 2vw, 10px);
    font-weight: 600;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1.2;
}
.progress-step.done .progress-step-label,
.progress-step.active .progress-step-label { color: var(--charcoal); }

.progress-connector {
    flex: 1;
    height: 2px;
    background: var(--border-strong);
    margin-bottom: clamp(18px, 4vw, 22px);
    position: relative;
    z-index: 0;
}
.progress-connector.done { background: var(--deep-rose); }

@media (max-width: 479px) {
    .orders-page { 
        padding: 0.75rem; 
    }
    
    .orders-page-title { 
        font-size: clamp(18px, 5vw, 24px); 
        margin-bottom: 1.25rem;
        font-weight: 400;
        line-height: 1.2;
    }
    
    .order-tabs {
        gap: 0;
        margin-bottom: 1.25rem;
        padding: 0;
        border-bottom: 2px solid var(--border);
    }
    
    .order-tab {
        padding: 0.65rem 0.85rem;
        font-size: 11px;
        font-weight: 600;
        flex-shrink: 0;
        white-space: nowrap;
    }
    
    .tab-count { 
        font-size: 9px; 
        min-width: 16px;
        height: 16px;
        padding: 0 4px;
        margin-left: 4px;
    }
    
    .orders-search-bar { 
        margin-bottom: 1.25rem;
    }
    
    .orders-search-bar i {
        left: 0.875rem;
        font-size: 16px;
    }
    
    .orders-search-bar input { 
        padding: 0.65rem 0.875rem 0.65rem 2.4rem; 
        font-size: 12px;
        border-radius: var(--radius-pill);
    }
    
    .order-card { 
        margin-bottom: 1rem;
        border-radius: var(--radius-lg);
    }
    
    .order-card-store-hdr {
        padding: 0.8rem 0.9rem;
        gap: 0.5rem;
    }
    
    .order-store-left { 
        gap: 0.5rem;
    }
    
    .order-store-icon { 
        width: 26px; 
        height: 26px; 
        font-size: 12px;
    }
    
    .order-store-name { 
        font-size: 13px;
        font-weight: 600;
    }
    
    .order-status-badge {
        font-size: 10px;
        padding: 4px 8px;
        font-weight: 700;
        white-space: nowrap;
        flex-shrink: 0;
    }
    
    .order-meta-row {
        gap: 0.625rem;
        padding: 0.55rem 0.9rem;
        font-size: 11px;
        flex-wrap: wrap;
    }
    
    .order-meta-row span { 
        display: flex; 
        align-items: center; 
        gap: 3px;
    }
    
    .order-meta-row i { 
        font-size: 13px;
    }
    
    .order-items-list { 
        padding: 0.75rem 0.9rem;
    }
    
    .order-item-row {
        gap: 0.75rem;
        padding: 0.7rem;
    }
    
    .order-item-img,
    .order-item-img-ph {
        width: 60px;
        height: 60px;
        font-size: 20px;
        flex-shrink: 0;
    }
    
    .order-item-info { 
        flex: 1; 
        min-width: 0;
    }
    
    .order-item-name { 
        font-size: 13px;
        font-weight: 600;
        line-height: 1.3;
        -webkit-line-clamp: 2;
    }
    
    .order-item-variant { 
        font-size: 11px;
        margin-bottom: 3px;
    }
    
    .order-item-qty { 
        font-size: 11px;
    }
    
    .order-item-price {
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
    }
    
    .order-card-footer {
        padding: 0.9rem;
        flex-direction: column;
        align-items: stretch;
        gap: 0.875rem;
    }
    
    .order-total-block {
        background: rgba(245,237,230,0.7);
        padding: 0.75rem 1rem;
        border-radius: var(--radius-md);
    }
    
    .order-total-label { 
        font-size: 10px;
        margin-bottom: 3px;
    }
    
    .order-total-amount { 
        font-size: 20px;
        font-weight: 600;
    }
    
    .order-total-items { 
        font-size: 11px;
        margin-top: 2px;
    }
    
    .order-card-actions {
        gap: 0.6rem;
        flex-direction: column;
        width: 100%;
    }
    
    .btn-order-action {
        width: 100%;
        padding: 0.65rem 1rem;
        font-size: 12px;
        font-weight: 600;
        border-radius: var(--radius-pill);
    }
    
    .btn-order-action i {
        margin-right: 0.35rem;
    }
    
    .order-more-badge {
        font-size: 11px;
        padding: 4px 10px;
        margin-top: 6px;
    }
    
    .orders-empty {
        padding: 3rem 1.5rem;
    }
    
    .orders-empty-icon { 
        font-size: 48px;
        margin-bottom: 1rem;
    }
    
    .orders-empty-title { 
        font-size: 18px;
        margin-bottom: 0.5rem;
    }
    
    .orders-empty-sub { 
        font-size: 12px;
        margin-bottom: 1.5rem;
    }
    
    .orders-skeleton { 
        gap: 1rem;
    }
    
    .skeleton-card {
        padding: 1rem;
    }
    
    /* Modal Responsive */
    .order-detail-modal { 
        max-width: 95vw;
        max-height: 95vh;
        border-radius: var(--radius-lg);
    }
    
    .modal-header {
        padding: 1rem 1.5rem;
    }
    
    .modal-body {
        max-height: calc(95vh - 180px);
        overflow-y: auto;
        padding: 1.25rem 1.5rem;
        font-size: 14px;
    }
    
    .modal-footer {
        padding: 1rem 1.5rem;
    }
    
    #orderDetailTitle {
        font-size: 18px !important;
    }
    
    .order-detail-section { 
        margin-bottom: 1.25rem;
    }
    
    .order-detail-section-title { 
        font-size: 10px;
        margin-bottom: 0.75rem;
    }
    
    .order-detail-grid { 
        grid-template-columns: 1fr;
        gap: 0.75rem;
    }
    
    .order-detail-item {

<script>
/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let _allOrders       = [];
let _filteredOrders  = [];
let _activeStatus    = 'all';
let _searchQuery     = '';
let _cartGroups      = [];

const STATUS_CONFIG = {
    pending:     { label: 'To Pay',      badge: 'badge-pending',     icon: 'ri-time-line',           progress: 0 },
    accepted:    { label: 'Preparing',  badge: 'badge-preparing',   icon: 'ri-box-1-line',          progress: 1 },
    preparing:   { label: 'Preparing',  badge: 'badge-preparing',   icon: 'ri-box-1-line',          progress: 1 },
    done_preparing: { label: 'Ready',  badge: 'badge-done_preparing',   icon: 'ri-checkbox-line',          progress: 2 },
    processing:  { label: 'Preparing',  badge: 'badge-processing',  icon: 'ri-box-1-line',          progress: 1 },
    on_delivery: { label: 'In Transit',  badge: 'badge-on_delivery', icon: 'ri-e-bike-line',         progress: 3 },
    delivered:   { label: 'Delivered',  badge: 'badge-delivered',   icon: 'ri-checkbox-circle-line',progress: 4 },
    cancelled:   { label: 'Cancelled',  badge: 'badge-cancelled',   icon: 'ri-close-circle-line',   progress: -1 },
};

const PROGRESS_STEPS = [
    { key: 'pending',     label: 'Order\nPlaced',  icon: 'ri-shopping-bag-line' },
    { key: 'preparing',   label: 'Preparing',      icon: 'ri-box-1-line' },
    { key: 'done_preparing', label: 'Ready',       icon: 'ri-checkbox-line' },
    { key: 'on_delivery', label: 'In Transit',     icon: 'ri-e-bike-line' },
    { key: 'delivered',   label: 'Delivered',      icon: 'ri-checkbox-circle-line' },
];

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
(async function init() {
    await Promise.all([loadOrders(), loadCartGroups()]);
    refreshOrdersView();
})();

/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
async function loadOrders() {
    try {
        const res  = await fetch('/api/account/orders/data');
        const data = await res.json();

        // Normalise — handle both array response and {orders:[]} wrapper
        _allOrders = Array.isArray(data) ? data : (data.orders || []);
    } catch (err) {
        console.error('Failed to load orders:', err);
        _allOrders = [];
    } finally {
        document.getElementById('ordersSkeleton').style.display = 'none';
        document.getElementById('ordersContent').style.display  = 'block';
    }
}

async function loadCartGroups() {
    try {
        if (typeof loadCart === 'function') {
            await loadCart();
        }

        const res = await fetch('/api/cart');
        const data = await res.json();
        const cartItems = Array.isArray(data?.cart?.items) ? data.cart.items : [];

        _cartGroups = normaliseCartGroups(cartItems);
    } catch (err) {
        console.error('Failed to load cart groups:', err);
        _cartGroups = [];
    }
}

function normaliseCartGroups(cartItems) {
    const groups = new Map();

    cartItems.forEach(item => {
        const storeId = item.store_id || item.product?.store_id;
        const storeName = item.store_name || item.product?.store_name || 'Store';
        const key = storeId || `store-${storeName}`;
        const price = Number(item.price || 0);
        const quantity = Number(item.quantity || 0);

        if (!groups.has(key)) {
            groups.set(key, {
                source: 'cart',
                id: `cart-${key}`,
                store_id: storeId,
                store_name: storeName,
                status: 'pending',
                payment_status: 'pending',
                created_at: item.updated_at || item.created_at || null,
                items: [],
                total_amount: 0,
                item_count: 0
            });
        }

        const group = groups.get(key);
        group.items.push({
            id: item.id,
            cart_item_id: item.id,
            product_id: item.product_id,
            variant_id: item.variant_id,
            name: item.name || item.product?.name || 'Product',
            product_name: item.name || item.product?.name || 'Product',
            variant_name: item.variant?.name || null,
            quantity,
            price,
            image_url: item.image_url || null,
            product_image_url: item.image_url || null,
            is_selected: Boolean(item.is_selected)
        });
        group.total_amount += price * quantity;
        group.item_count += quantity;
    });

    return Array.from(groups.values());
}

function refreshOrdersView() {
    updateTabCounts();
    applyFilters();
}

/* ═══════════════════════════════════════
   FILTERS
═══════════════════════════════════════ */
function filterOrdersByStatus(status, btn) {
    _activeStatus = status;
    document.querySelectorAll('.order-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
}

function filterOrdersBySearch(q) {
    _searchQuery = q.toLowerCase().trim();
    applyFilters();
}

function applyFilters() {
    let result = [];

    if (_activeStatus === 'all') {
        result = [
            ..._cartGroups,
            ..._allOrders.filter(o => getDisplayState(o).key !== 'pending')
        ];
    } else if (_activeStatus === 'pending') {
        result = [..._cartGroups];
    } else {
        result = _allOrders.filter(o => getDisplayState(o).key === _activeStatus);
    }

    if (_searchQuery) {
        result = result.filter(o =>
            String(o.id || o.order_number || '').toLowerCase().includes(_searchQuery) ||
            (o.store_name || '').toLowerCase().includes(_searchQuery) ||
            (o.items || []).some(i => (i.name || i.product_name || '').toLowerCase().includes(_searchQuery))
        );
    }

    _filteredOrders = result;
    renderOrders(_filteredOrders);
}

/* ═══════════════════════════════════════
   TAB COUNTS
═══════════════════════════════════════ */
function updateTabCounts() {
    const total = _cartGroups.length + _allOrders.filter(o => getDisplayState(o).key !== 'pending').length;
    const el    = document.getElementById('count-all');
    if (el) el.textContent = total;

    ['pending','processing','on_delivery'].forEach(s => {
        const n = s === 'pending'
            ? _cartGroups.length
            : _allOrders.filter(o => getDisplayState(o).key === s).length;
        const cnt = document.getElementById(`count-${s}`);
        if (cnt) {
            if (n > 0) { cnt.textContent = n; cnt.style.display = 'inline-flex'; }
            else        { cnt.style.display = 'none'; }
        }
    });
}

/* ═══════════════════════════════════════
   RENDER ORDERS
═══════════════════════════════════════ */
function renderOrders(orders) {
    const container = document.getElementById('ordersContent');

    if (!orders || orders.length === 0) {
        container.innerHTML = renderEmpty();
        return;
    }

    container.innerHTML = orders.map(order => renderOrderCard(order)).join('');
}

function renderEmpty(msg) {
    const msgs = {
        all:         'You haven\'t placed any orders yet.',
        pending:     'No orders waiting for payment.',
        processing:  'No orders being prepared.',
        on_delivery: 'No orders on the way.',
        delivered:   'No completed orders yet.',
        cancelled:   'No cancelled orders.',
    };
    return `
        <div class="orders-empty">
            <i class="ri-shopping-bag-3-line orders-empty-icon"></i>
            <div class="orders-empty-title">No orders found</div>
            <div class="orders-empty-sub">${msg || msgs[_activeStatus] || 'No orders match your search.'}</div>
            <a href="/" class="btn btn-rose" style="display:inline-flex;align-items:center;gap:.5rem;margin-top:.5rem;">
                <i class="ri-store-line"></i> Start Shopping
            </a>
        </div>`;
}

function renderOrderCard(order) {
    if (order.source === 'cart') {
        return renderCartGroupCard(order);
    }

    const display    = getDisplayState(order);
    const cfg        = STATUS_CONFIG[display.key] || STATUS_CONFIG.pending;
    const items      = order.items || [];
    const showItems  = items.slice(0, 2);
    const moreCount  = items.length - showItems.length;
    const orderId    = order.order_number || `ORD-${String(order.id).padStart(4,'0')}`;
    const dateStr    = formatDate(order.date || order.created_at);
    const storeName  = order.store_name || 'E-FLOWERS Store';
    const totalAmt   = formatPeso(order.total_amount ?? order.total ?? 0);
    const itemCount  = items.reduce((s, i) => s + (i.quantity || 1), 0);

    const itemsHtml = showItems.map(item => {
        const img    = item.image_url || item.product_image_url;
        const name   = item.name || item.product_name || 'Product';
        const variant = item.variant_name ? `<div class="order-item-variant">${esc(item.variant_name)}</div>` : '';
        const qty    = item.quantity || 1;
        const price  = formatPeso(item.price || 0);
        const imgHtml = img
            ? `<img class="order-item-img" src="${img}" alt="${esc(name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
               <div class="order-item-img-ph" style="display:none;"><i class="ri-flower-line"></i></div>`
            : `<div class="order-item-img-ph"><i class="ri-flower-line"></i></div>`;
        return `
            <div class="order-item-row">
                ${imgHtml}
                <div class="order-item-info">
                    <div class="order-item-name">${esc(name)}</div>
                    ${variant}
                    <div class="order-item-qty">Qty: ${qty}</div>
                </div>
                <div class="order-item-price">${price}</div>
            </div>`;
    }).join('');

    const moreBadge = moreCount > 0
        ? `<div class="order-more-badge" onclick="viewOrderDetail(${order.id || `'${orderId}'`})">
               +${moreCount} more item${moreCount > 1 ? 's' : ''}
           </div>`
        : '';

    const ctaButtons = buildCTAButtons(order);

    return `
        <div class="order-card" id="order-card-${order.id}">
            <!-- Store header -->
            <div class="order-card-store-hdr">

    if (display.key === 'pending') {
        btns += `<button class="btn-order-action primary" onclick="payOrder(${id})"><i class="ri-bank-card-line"></i> Pay Now</button>`;
        btns += `<button class="btn-order-action danger" onclick="cancelOrderFromCard(${id})">Cancel</button>`;
    }
    if (display.key === 'delivered') {
        if (!order.all_rated) {
            btns += `<button class="btn-order-action primary" onclick="rateOrder(${id})"><i class="ri-star-line"></i> Rate</button>`;

async function cancelOrderFromCard(orderId) {
    if (!await window.openConfirmModal('Cancel this order?')) return;
    try {
        const res = await fetch(`/api/account/orders/${orderId}/cancel`, { method: 'POST' });
        const d   = await res.json();
        if (d.success) {
            showOrderToast('Order cancelled.');
            await loadOrders();
        } else {
            showOrderToast(d.message || 'Could not cancel order.');
        }
    } catch { showOrderToast('Error cancelling order.'); }
}

function payOrder(orderId) {
    showOrderToast('Redirecting to payment…');
    // Hook up your actual payment flow here
}

async function payCartStore(storeId) {
    if (!storeId) {
        showOrderToast('Store checkout is unavailable for this basket.');
        return;
    }

    try {
        if (typeof loadCart === 'function') {
            await loadCart();
        }

        if (!Array.isArray(cart) || !cart.length) {
            showOrderToast('Your basket is empty.');
            return;
        }

        const token = await getAuthToken();
        const storeIds = [...new Set(cart.map(item => item.store_id).filter(Boolean))];

        await Promise.all(storeIds.map(id =>
            fetch(`/api/v1/checkout/cart/store/${id}/toggle`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ selected: id === storeId })
            })
        ));

        cart.forEach(item => {
            item.is_selected = item.store_id === storeId;
        });

        if (typeof updateCartDisplay === 'function') updateCartDisplay();
        closeOrderDetail();
        checkout();
    } catch (error) {
        console.error('Pay cart store error:', error);
        showOrderToast('Could not start checkout for these items.');
        if (typeof loadCart === 'function') {
            await loadCart();
        }
    }
}

let _ratingOrderId = null;
let _ratingState = {}; // { [order_item_id]: { rating: 0, comment: '' } }

async function rateOrder(orderId) {
    _ratingOrderId = orderId;
    _ratingState = {};

    const modal = document.getElementById('ratingModal');
    const body = document.getElementById('ratingModalBody');
    const submitBtn = document.getElementById('ratingSubmitBtn');
    submitBtn.disabled = true;

    modal.style.display = 'flex';
    modal.classList.add('active');
    body.innerHTML = `<div style="text-align:center;padding:2rem;"><div class="loading-spinner" style="margin:0 auto;"></div></div>`;

    try {
        // Fetch order detail and existing ratings in parallel
        const [orderRes, ratingsRes] = await Promise.all([
            fetch(`/api/account/orders/${orderId}`).then(r => r.json()),
            fetch(`/api/account/orders/${orderId}/ratings`).then(r => r.json()),
        ]);

        const items = orderRes.items || [];
        const existingRatings = ratingsRes.ratings || {};

        if (!items.length) {
            body.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--muted);">No items to rate.</div>`;
            return;
        }

        // Initialize rating state — only for unrated items
        const unratedItems = items.filter(item => !existingRatings[String(item.id)]);

        if (unratedItems.length === 0) {
            closeRatingModal();
            return;
        }

        unratedItems.forEach(item => {
            _ratingState[item.id] = { rating: 0, comment: '' };
        });

        body.innerHTML = `
            <div class="rating-items-list">
                ${unratedItems.map(item => {
                    const name = item.name || item.product_name || 'Product';
                    const variant = item.variant_name ? `<div class="rating-item-variant">${esc(item.variant_name)}</div>` : '';
                    const img = item.image_url || item.product_image_url;
                    const imgHtml = img
                        ? `<img class="rating-item-img" src="${img}" alt="${esc(name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                           <div class="rating-item-img-ph" style="display:none;"><i class="ri-flower-line"></i></div>`
                        : `<div class="rating-item-img-ph"><i class="ri-flower-line"></i></div>`;
                    return `
                        <div class="rating-item-card" data-item-id="${item.id}">
                            <div class="rating-item-header">
                                ${imgHtml}
                                <div class="rating-item-info">
                                    <div class="rating-item-name">${esc(name)}</div>
                                    ${variant}
                                </div>
                            </div>
                            <div class="rating-stars-row" data-item-id="${item.id}">
                                ${[1,2,3,4,5].map(star => `<i class="ri-star-line rating-star" data-star="${star}" data-item-id="${item.id}" onclick="setRating(${item.id}, ${star})" onmouseenter="hoverStars(${item.id}, ${star})" onmouseleave="unhoverStars(${item.id})"></i>`).join('')}
                            </div>
                            <textarea class="rating-comment" data-item-id="${item.id}" placeholder="Share your thoughts about this product (optional)" maxlength="500" oninput="_ratingState[${item.id}].comment = this.value"></textarea>
                        </div>`;
                }).join('')}
            </div>`;

        updateSubmitBtnState();
    } catch (err) {
        body.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--muted);">Failed to load order details.</div>`;
    }
}

function setRating(itemId, star) {
    _ratingState[itemId].rating = star;
    const row = document.querySelector(`.rating-stars-row[data-item-id="${itemId}"]`);
    if (row) {
        row.querySelectorAll('.rating-star').forEach(el => {
            const s = parseInt(el.dataset.star);
            el.classList.toggle('active', s <= star);
            el.className = el.className.replace(/ri-star-(fill|line)/, s <= star ? 'ri-star-fill' : 'ri-star-line');
        });
    }
    updateSubmitBtnState();
}

function hoverStars(itemId, star) {
    const row = document.querySelector(`.rating-stars-row[data-item-id="${itemId}"]`);
    if (row) {
        row.querySelectorAll('.rating-star').forEach(el => {
            const s = parseInt(el.dataset.star);
            el.classList.toggle('hovered', s <= star);
        });
    }
}

function unhoverStars(itemId) {
    const row = document.querySelector(`.rating-stars-row[data-item-id="${itemId}"]`);
    if (row) {
        row.querySelectorAll('.rating-star').forEach(el => {
            el.classList.remove('hovered');
        });
    }
}

function updateSubmitBtnState() {
    const btn = document.getElementById('ratingSubmitBtn');
    const hasAtLeastOne = Object.values(_ratingState).some(r => r.rating > 0);
    btn.disabled = !hasAtLeastOne;
}

async function submitRatings() {
    const btn = document.getElementById('ratingSubmitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    const ratings = Object.entries(_ratingState)
        .filter(([_, r]) => r.rating > 0)
        .map(([itemId, r]) => ({
            order_item_id: parseInt(itemId),
            rating: r.rating,
            comment: r.comment || null,
        }));

    try {
        const res = await fetch(`/api/account/orders/${_ratingOrderId}/rate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ratings }),
        });
        const data = await res.json();

        if (data.success) {
            showOrderToast('Thank you for your rating!');
            closeRatingModal();
            
            // Hide the Rate button from the order card without reloading
            const rateBtn = document.querySelector(`#order-card-${_ratingOrderId} button[onclick*="rateOrder"]`);
            if (rateBtn) {
                rateBtn.style.display = 'none';
            }
        } else {
            showOrderToast(data.error || 'Failed to submit rating.');
            btn.disabled = false;
            btn.textContent = 'Submit Rating';
        }
    } catch {
        showOrderToast('Error submitting rating.');
        btn.disabled = false;
        btn.textContent = 'Submit Rating';
    }
}

function closeRatingModal() {
    const modal = document.getElementById('ratingModal');
    modal.classList.remove('active');
    setTimeout(() => { modal.style.display = 'none'; }, 300);
    _ratingOrderId = null;
    _ratingState = {};
}

async function reorderItems(orderId) {
    showOrderToast('Adding items to cart…');
    try {
        const res = await fetch(`/api/account/orders/${orderId}`);
        const order = await res.json();
        const items = order.items || [];

        if (!items.length) {
            showOrderToast('No items found in this order.');
            return;
        }

        let added = 0;
        let skipped = 0;

        for (const item of items) {
            try {
                const payload = {
                    product_id: item.product_id,
                    quantity: 1,
                };
                if (item.variant_id) {
                    payload.variant_id = item.variant_id;
                }
                const r = await fetch('/api/cart/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const d = await r.json();
                if (r.ok && !d.error) {
                    added++;
                } else {
                    skipped++;
                }
            } catch {
                skipped++;
            }
        }

        if (added > 0) {
            showOrderToast(`${added} item${added !== 1 ? 's' : ''} added to cart${skipped > 0 ? ` (${skipped} out of stock)` : ''}`);
            // Reload cart groups and re-render
            await loadCartGroups();
            applyFilters();
        } else {
            showOrderToast('All items are out of stock.');
        }
    } catch {
        showOrderToast('Failed to reorder. Please try again.');
    }
}

/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
function formatPeso(v) {
    return '₱' + parseFloat(v || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDate(dt) {
    if (!dt) return '—';
    try {
        return new Intl.DateTimeFormat('en-PH', { year: 'numeric', month: 'short', day: 'numeric' }).format(new Date(dt));
    } catch { return dt; }
}

function formatDateWithTime(dt) {
    if (!dt) return '—';
    try {
        // Append 'Z' to ensure JavaScript treats it as UTC (backend sends UTC without Z suffix)
        const dateString = dt.includes('Z') ? dt : dt + 'Z';
        return new Intl.DateTimeFormat('en-PH', { 
            year: 'numeric', 
            month: 'short', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: true,
            timeZone: 'Asia/Manila'
        }).format(new Date(dateString));
    } catch { return dt; }
}

function capitalise(s) {
    return s ? s.charAt(0).toUpperCase() + s.slice(1).replace(/_/g, ' ') : '';
}

function getDisplayState(order) {
    const status = order.status || 'pending';
    const paymentStatus = order.payment_status || 'pending';

    if (status === 'cancelled') {
        return { key: 'cancelled', label: 'Cancelled', progressKey: 'cancelled' };
    }
    if (status === 'delivered') {
        return { key: 'delivered', label: 'Delivered', progressKey: 'delivered' };
    }
    if (status === 'on_delivery') {
        return { key: 'on_delivery', label: 'On the Way', progressKey: 'on_delivery' };
    }
    if (status === 'done_preparing') {
        return { key: 'processing', label: 'Ready', progressKey: 'done_preparing' };
    }

    // Receipt uploaded but still waiting for seller/admin review.
    if (paymentStatus === 'pending_verification') {
        return { key: 'processing', label: 'Payment Review', progressKey: 'pending' };
    }

    if (status === 'accepted' || status === 'preparing' || paymentStatus === 'verified') {
        return { key: 'processing', label: 'Processing', progressKey: 'processing' };
    }

    return { key: 'pending', label: 'To Pay', progressKey: 'pending' };
}

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function showOrderToast(msg) {
    if (typeof showToast === 'function') { showToast(msg); return; }
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--charcoal);color:white;padding:12px 24px;border-radius:50px;font-size:14px;z-index:9999;';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

document.getElementById('orderDetailModal').addEventListener('click', function(e) {
    if (e.target === this) closeOrderDetail();
});
document.getElementById('ratingModal').addEventListener('click', function(e) {
    if (e.target === this) closeRatingModal();
});
