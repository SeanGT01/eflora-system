<h1 class="profile-title">Purchase History</h1>

<div class="profile-card orders-container">
    <div style="margin-bottom: 1.5rem;">
        <input type="text" class="form-control" placeholder="Search orders..." style="max-width: 300px;" id="orderSearch">
    </div>
    
    <div style="overflow-x: auto;">
        <table class="orders-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Orders will be loaded here by JavaScript -->
            </tbody>
        </table>
    </div>
    
    <!-- Loading placeholder -->
    <div class="loading" id="ordersLoading">
        <div class="loading-spinner"></div>
    </div>
</div>
