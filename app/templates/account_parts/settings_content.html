<h1 class="profile-title" style="font-size: clamp(24px, 5vw, 32px); margin-bottom: clamp(1.25rem, 3vw, 2rem);">Account Settings</h1>

<div class="profile-card">
    <h3 class="card-title" style="margin-bottom: clamp(1rem, 2vw, 1.5rem); font-size: clamp(16px, 3vw, 18px);">Notification Preferences</h3>
    
    <form id="settingsForm">
        <div class="form-group" style="margin-bottom: clamp(1rem, 2vw, 1.5rem); padding-bottom: clamp(0.875rem, 2vw, 1.5rem); border-bottom: 1px solid var(--border);">
            <label class="form-label" style="display: flex; align-items: flex-start; gap: clamp(0.5rem, 1.5vw, 0.75rem); cursor: pointer; font-weight: normal; text-transform: none; letter-spacing: normal; font-size: clamp(13px, 2.5vw, 14px); text-transform: none; color: var(--charcoal); margin-bottom: 0;">
                <input type="checkbox" name="email_notifications" checked style="width: clamp(16px, 3vw, 18px); height: clamp(16px, 3vw, 18px); margin-top: clamp(2px, 1vw, 3px); flex-shrink: 0; cursor: pointer; min-height: 18px; min-width: 18px;">
                <span>Email Notifications</span>
            </label>
            <small class="form-text" style="font-size: clamp(11px, 2vw, 12px); color: var(--muted); margin-top: clamp(0.35rem, 1vw, 0.5rem); margin-left: clamp(1.75rem, 5vw, 2.25rem); display: block;">Receive order updates and promotions via email</small>
        </div>
        
        <div class="form-group" style="margin-bottom: clamp(1rem, 2vw, 1.5rem); padding-bottom: clamp(0.875rem, 2vw, 1.5rem); border-bottom: 1px solid var(--border);">
            <label class="form-label" style="display: flex; align-items: flex-start; gap: clamp(0.5rem, 1.5vw, 0.75rem); cursor: pointer; font-weight: normal; text-transform: none; letter-spacing: normal; font-size: clamp(13px, 2.5vw, 14px); color: var(--charcoal); margin-bottom: 0;">
                <input type="checkbox" name="sms_notifications" checked style="width: clamp(16px, 3vw, 18px); height: clamp(16px, 3vw, 18px); margin-top: clamp(2px, 1vw, 3px); flex-shrink: 0; cursor: pointer; min-height: 18px; min-width: 18px;">
                <span>SMS Notifications</span>
            </label>
            <small class="form-text" style="font-size: clamp(11px, 2vw, 12px); color: var(--muted); margin-top: clamp(0.35rem, 1vw, 0.5rem); margin-left: clamp(1.75rem, 5vw, 2.25rem); display: block;">Receive order updates via SMS</small>
        </div>
        
        <div class="form-group" style="margin-bottom: clamp(1rem, 2vw, 1.5rem);">
            <label class="form-label" style="display: flex; align-items: flex-start; gap: clamp(0.5rem, 1.5vw, 0.75rem); cursor: pointer; font-weight: normal; text-transform: none; letter-spacing: normal; font-size: clamp(13px, 2.5vw, 14px); color: var(--charcoal); margin-bottom: 0;">
                <input type="checkbox" name="marketing_emails" style="width: clamp(16px, 3vw, 18px); height: clamp(16px, 3vw, 18px); margin-top: clamp(2px, 1vw, 3px); flex-shrink: 0; cursor: pointer; min-height: 18px; min-width: 18px;">
                <span>Marketing Emails</span>
            </label>
            <small class="form-text" style="font-size: clamp(11px, 2vw, 12px); color: var(--muted); margin-top: clamp(0.35rem, 1vw, 0.5rem); margin-left: clamp(1.75rem, 5vw, 2.25rem); display: block;">Receive promotional emails and offers</small>
        </div>
        
        <div class="form-actions" style="margin-top: clamp(1rem, 2vw, 1.5rem); padding-top: clamp(1rem, 2vw, 1.5rem); border-top: 1px solid var(--border); justify-content: flex-start;">
            <button type="submit" class="btn btn-rose" style="min-height: 40px; padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(0.875rem, 2vw, 1.25rem); font-size: clamp(12px, 2vw, 13px); display: flex; align-items: center; gap: 0.4rem;">Save Preferences</button>
        </div>
    </form>
</div>

<div class="profile-card" style="margin-top: clamp(1.25rem, 3vw, 2rem);">
    <h3 class="card-title" style="margin-bottom: clamp(1rem, 2vw, 1.5rem); font-size: clamp(16px, 3vw, 18px);">Privacy Settings</h3>
    
    <div style="margin-bottom: clamp(1rem, 2vw, 1.5rem);">
        <button class="btn btn-outline" onclick="exportData()" style="min-height: 40px; padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(0.875rem, 2vw, 1.25rem); font-size: clamp(12px, 2vw, 13px); display: flex; align-items: center; gap: 0.4rem; white-space: nowrap;">
            <i class="ri-download-line"></i> Export My Data
        </button>
        <small class="form-text" style="font-size: clamp(11px, 2vw, 12px); color: var(--muted); margin-top: clamp(0.35rem, 1vw, 0.5rem); display: block;">Download all your personal data from E-FLOWERS</small>
    </div>
    
    <div>
        <button class="btn btn-outline" style="color: #ff6b6b; min-height: 40px; padding: clamp(0.6rem, 1.5vw, 0.8rem) clamp(0.875rem, 2vw, 1.25rem); font-size: clamp(12px, 2vw, 13px); display: flex; align-items: center; gap: 0.4rem; white-space: nowrap;" onclick="deleteAccount()">
            <i class="ri-delete-bin-line"></i> Delete Account
        </button>
        <small class="form-text" style="color: #ff6b6b; font-size: clamp(11px, 2vw, 12px); margin-top: clamp(0.35rem, 1vw, 0.5rem); display: block;">This action cannot be undone</small>
    </div>
</div>

<script>
    // Settings form submission
    document.getElementById('settingsForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        const data = Object.fromEntries(formData);
        
        try {
            const response = await fetch('/api/account/settings', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.success) {
                showNotification('Settings updated successfully!');
            } else {
                alert('Error: ' + result.message);
            }
        } catch (error) {
            alert('Network error. Please try again.');
        }
    });
    
    function exportData() {
        alert('Data export functionality coming soon!');
    }
    
    function deleteAccount() {
        if (confirm('Are you sure you want to delete your account? This cannot be undone.')) {
            alert('Account deletion functionality coming soon!');
        }
    }
</script>
