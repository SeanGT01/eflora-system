<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Verification — E-FLOWERS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --cream: #faf6f0;
            --warm-white: #fffdf9;
            --blush: #f2c4ce;
            --deep-rose: #b5445a;
            --sage: #7a9e7e;
            --deep-sage: #4a6b4e;
            --charcoal: #2c2520;
            --muted: #9a8d85;
            --border: rgba(107, 76, 59, 0.12);
            --font-display: 'Cormorant Garamond', serif;
            --font-sans: 'DM Sans', sans-serif;
            --shadow-leaf: 0 8px 40px rgba(42, 35, 30, 0.12);
            --radius-lg: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .verify-card {
            background: var(--warm-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-leaf);
            border: 1px solid var(--border);
            max-width: 460px;
            width: 100%;
            padding: 3rem 2.5rem;
            text-align: center;
        }

        .verify-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 36px;
        }

        .verify-icon.success {
            background: rgba(122, 158, 126, 0.12);
            color: var(--deep-sage);
        }

        .verify-icon.error {
            background: rgba(181, 68, 90, 0.10);
            color: var(--deep-rose);
        }

        .verify-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 500;
            color: var(--charcoal);
            margin-bottom: 0.75rem;
        }

        .verify-message {
            color: var(--muted);
            font-size: 14.5px;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .verify-brand {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 400;
            color: var(--muted);
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .verify-brand span {
            color: var(--deep-rose);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="verify-card">
        {% if success %}
        <div class="verify-icon success">
            <i class="ri-checkbox-circle-line"></i>
        </div>
        <h1 class="verify-title">You're Verified!</h1>
        {% else %}
        <div class="verify-icon error">
            <i class="ri-error-warning-line"></i>
        </div>
        <h1 class="verify-title">Verification Failed</h1>
        {% endif %}

        <p class="verify-message">{{ message }}</p>

        <div class="verify-brand">
            <span>E-FLOWERS</span> — Blooming with Technology
        </div>
    </div>
</body>
</html>
