<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Rider Password — E-FLOWERS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --cream: #faf6f0;
            --warm-white: #fffdf9;
            --blush: #f2c4ce;
            --deep-rose: #b5445a;
            --sage: #7a9e7e;
            --deep-sage: #4a6b4e;
            --charcoal: #2c2520;
            --muted: #9a8d85;
            --border: rgba(107, 76, 59, 0.12);
            --font-display: 'Cormorant Garamond', serif;
            --font-sans: 'DM Sans', sans-serif;
            --shadow-leaf: 0 8px 40px rgba(42, 35, 30, 0.12);
            --radius-lg: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .setup-card {
            background: var(--warm-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-leaf);
            border: 1px solid var(--border);
            max-width: 520px;
            width: 100%;
            padding: 3rem 2.5rem;
        }

        .setup-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .setup-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(122, 158, 126, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: var(--deep-sage);
            font-size: 36px;
        }

        .setup-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 500;
            color: var(--charcoal);
            margin-bottom: 0.5rem;
        }

        .setup-subtitle {
            color: var(--muted);
            font-size: 14px;
        }

        .rider-info {
            background: rgba(122, 158, 126, 0.05);
            border-left: 3px solid var(--deep-sage);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-size: 14px;
        }

        .rider-info-label {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .rider-info-value {
            color: var(--charcoal);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            color: var(--charcoal);
            margin-bottom: 0.5rem;
            font-size: 14px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 0.875rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: var(--font-sans);
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: var(--deep-sage);
            box-shadow: 0 0 0 3px rgba(122, 158, 126, 0.1);
        }

        .password-hint {
            font-size: 12px;
            color: var(--muted);
            margin-top: 0.5rem;
        }

        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            flex: 1;
            padding: 0.875rem;
            border: none;
            border-radius: 10px;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--deep-sage);
            color: white;
        }

        .btn-primary:hover {
            background: var(--sage);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 107, 78, 0.3);
        }

        .btn-primary:disabled {
            background: var(--muted);
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(181, 68, 90, 0.1);
            border-left: 3px solid var(--deep-rose);
            color: var(--deep-rose);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(122, 158, 126, 0.1);
            border-left: 3px solid var(--deep-sage);
            color: var(--deep-sage);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .verify-brand {
            font-family: var(--font-display);
            font-size: 14px;
            color: var(--muted);
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .verify-brand span {
            color: var(--deep-rose);
            font-weight: 500;
        }

        .loading {
            display: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ─── COMPREHENSIVE RESPONSIVE DESIGN ─── */
        /* Mobile First: < 480px */
        @media (max-width: 479px) {
            body { padding: 1rem; }
            
            .setup-card {
                max-width: 100%;
                padding: 1.5rem 1.25rem;
                border-radius: 14px;
            }
            
            .setup-header { margin-bottom: 1.5rem; }
            .setup-icon { width: 64px; height: 64px; font-size: 28px; margin: 0 auto 1rem; }
            .setup-title { font-size: 20px; margin-bottom: 0.4rem; }
            .setup-subtitle { font-size: 13px; }
            
            .rider-info {
                padding: 0.875rem;
                margin-bottom: 1.5rem;
                font-size: 13px;
            }
            
            .rider-info-label { font-size: 10px; margin-bottom: 0.2rem; }
            
            .form-group { margin-bottom: 1.25rem; }
            
            label {
                font-size: 12px;
                margin-bottom: 0.4rem;
            }
            
            input[type="password"],
            input[type="text"] {
                padding: 0.7rem 0.75rem;
                font-size: 13px;
                border-radius: 8px;
            }
            
            .password-hint { font-size: 11px; margin-top: 0.4rem; }
            
            .form-actions {
                flex-direction: column;
                gap: 0.625rem;
                margin-top: 1.5rem;
            }
            
            .btn {
                padding: 0.65rem 1rem;
                font-size: 12px;
                width: 100%;
                border-radius: 8px;
            }
            
            .error-message,
            .success-message {
                padding: 0.875rem;
                font-size: 12px;
                margin-bottom: 1.25rem;
            }
            
            .verify-brand {
                font-size: 12px;
                margin-top: 1.5rem;
                padding-top: 1rem;
            }
        }

        /* Small Tablets: 480px - 767px */
        @media (min-width: 480px) and (max-width: 767px) {
            body { padding: 1.5rem; }
            
            .setup-card {
                max-width: 100%;
                padding: 2rem 1.75rem;
            }
            
            .setup-header { margin-bottom: 2rem; }
            .setup-icon { width: 72px; height: 72px; font-size: 32px; }
            .setup-title { font-size: 22px; }
            .setup-subtitle { font-size: 14px; }
            
            .rider-info {
                padding: 1rem;
                margin-bottom: 1.75rem;
            }
            
            label { font-size: 13px; margin-bottom: 0.5rem; }
            input[type="password"],
            input[type="text"] {
                padding: 0.75rem 1rem;
                font-size: 13px;
            }
            
            .form-actions { gap: 0.75rem; margin-top: 1.75rem; }
            .btn { padding: 0.7rem 1.25rem; font-size: 13px; }
        }

        /* Tablets: 768px - 1023px */
        @media (min-width: 768px) and (max-width: 1023px) {
            body { padding: 2rem; }
            
            .setup-card {
                max-width: 520px;
                padding: 2.5rem 2.25rem;
            }
            
            .setup-header { margin-bottom: 2.25rem; }
            .setup-icon { width: 76px; height: 76px; margin: 0 auto 1.25rem; }
            .setup-title { font-size: 24px; }
            
            .rider-info { margin-bottom: 2rem; }
            .form-group { margin-bottom: 1.5rem; }
            .form-actions { margin-top: 2rem; }
        }

        /* Desktops: 1024px+ */
        @media (min-width: 1024px) {
            body { padding: 2rem; }
            
            .setup-card {
                max-width: 520px;
                padding: 3rem 2.5rem;
            }
            
            .form-actions { gap: 1rem; }
        }
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="setup-header">
            <div class="setup-icon">
                <i class="ri-lock-line"></i>
            </div>
            <h1 class="setup-title">Create Your Password</h1>
            <p class="setup-subtitle">Complete your rider account setup</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <div class="rider-info">
            <div class="rider-info-label">Rider Name</div>
            <div class="rider-info-value">{{ full_name }}</div>

            <div class="rider-info-label" style="margin-top: 0.75rem;">Email</div>
            <div class="rider-info-value">{{ email }}</div>

            <div class="rider-info-label" style="margin-top: 0.75rem;">Store</div>
            <div class="rider-info-value">{{ store_name }}</div>
        </div>

        <form id="passwordForm">
            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter a strong password"
                    required
                    minlength="6"
                />
                <div class="password-hint">
                    <i class="ri-information-line"></i> 
                    Minimum 6 characters. Use a mix of letters and numbers for security.
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Confirm your password"
                    required
                    minlength="6"
                />
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <span class="button-text">Create Account</span>
                    <span class="loading">
                        <span class="spinner"></span> Setting up...
                    </span>
                </button>
            </div>
        </form>

        <div class="verify-brand">
            <span>E-FLOWERS</span> — Blooming with Technology
        </div>
    </div>

    <script>
        const form = document.getElementById('passwordForm');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const errorMsg = document.getElementById('errorMessage');
        const successMsg = document.getElementById('successMessage');
        const submitBtn = form.querySelector('button[type="submit"]');
        const buttonText = submitBtn.querySelector('.button-text');
        const loading = submitBtn.querySelector('.loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');

            const password = passwordInput.value.trim();
            const confirmPassword = confirmInput.value.trim();

            // Validation
            if (!password || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            // Submit
            submitBtn.disabled = true;
            buttonText.style.display = 'none';
            loading.style.display = 'inline-block';

            try {
                const response = await fetch('/api/rider/set-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: '{{ token }}',
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess(data.message);
                    form.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showError(data.error || 'Something went wrong');
                    submitBtn.disabled = false;
                    buttonText.style.display = 'inline';
                    loading.style.display = 'none';
                }
            } catch (err) {
                showError('Network error. Please try again.');
                submitBtn.disabled = false;
                buttonText.style.display = 'inline';
                loading.style.display = 'none';
            }
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.classList.add('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
